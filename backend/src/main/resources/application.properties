# =============================================
#  GBG Backend – Application Configuration
# =============================================

server.port=8080

# ── Development: H2 In-Memory Database ───────
spring.datasource.url=jdbc:h2:mem:gbgdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 web console (available at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA – Hibernate creates tables, then data.sql seeds them
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ── Production: PostgreSQL ────────────────────
# Uncomment and set the values below when deploying.
# Remember to also disable the H2 settings above.
#
# spring.datasource.url=jdbc:postgresql://localhost:5432/gbgdb
